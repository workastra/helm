apiVersion: v1
kind: Service
metadata:
  name: {{ include "workastra.iam.fullname" . }}
  labels:
    {{- include "workastra.iam.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.iam.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "workastra.iam.selectorLabels" . | nindent 4 }}
