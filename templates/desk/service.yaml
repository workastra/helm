{{- if .Values.desk.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "workastra.desk.fullname" . }}
  labels:
    {{- include "workastra.desk.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.desk.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "workastra.desk.selectorLabels" . | nindent 4 }}
{{- end }}
