apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "desk.fullname" . }}
  labels:
    {{- include "desk.labels" . | nindent 4 }}
data:
  .env.production: |
    APP_BASE_URL={{ .Values.global.tenant.scheme }}://{{ .Values.global.tenant.domain }}
    IAM_ISSUER_URL=http://localhost:9000
    IAM_TLS_SKIP_VERIFY=true
    IAM_OAUTH_CLIENT_ID=workastra-desk
    LOCK_MODE=in-memory
